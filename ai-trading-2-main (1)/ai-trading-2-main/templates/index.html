<!DOCTYPE html>
<html>
<head>
    <title>AI Trading Terminal</title>
    <script src="https://s3.tradingview.com/tv.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 10px;
        }

        .nav {
            text-align: center;
            margin-bottom: 5px;
        }

        .nav button {
            background: #2563eb;
        }

        .top-bar {
            display: flex;
            justify-content: space-around;
            background: #111827;
            padding: 10px;
        }

        .main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            height: 55vh;
        }

        .left, .right {
            padding: 10px;
            overflow-y: auto;
        }

        .bottom {
            height: 45vh;
            padding: 10px;
            overflow-y: auto;
        }

        .card {
            background: #1e293b;
            padding: 10px;
            margin: 8px;
            border-radius: 10px;
        }

        .buy { color: #22c55e; }
        .sell { color: #ef4444; }

        .bar {
            height: 6px;
            background: #111;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        .fill { height: 100%; transition: width 0.5s; }

        .green { background: #22c55e; }
        .red { background: #ef4444; }

        .confidence-bar {
            height: 6px;
            background: #111;
            border-radius: 5px;
            margin-top: 5px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            transition: width 0.6s;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        input, button {
            padding: 6px;
            margin: 3px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        table {
            width: 100%;
            font-size: 12px;
            border-collapse: collapse;
        }

        td {
            padding: 4px;
            border-bottom: 1px solid #222;
        }
    </style>
</head>

<body>

<h1>🚀 AI Trading Terminal</h1>

<div class="nav">
    <a href="/charts">
        <button>📊 Open Advanced Charts</button>
    </a>
</div>

<div style="text-align:center;">
    <input id="symbols" value="BTCUSDT,ETHUSDT,AAPL">
    <input id="rr" value="2">
    <input id="risk" value="1">
    <button onclick="saveConfig()">Save</button>
</div>

<!-- ACCOUNT -->
<div class="top-bar">
    <div>Total PnL: $<span id="totalPnL">0</span></div>
    <div>Signals: <span id="trades">0</span></div>
</div>

<div class="main">

    <div class="left">
        <h3>📊 Signals</h3>
        <div id="signals"></div>
    </div>

    <div class="right">
        <h3>🔥 Best Trade</h3>
        <div id="best"></div>
    </div>

</div>

<div class="bottom">
    <h3>📉 Charts</h3>
    <div id="charts"></div>

    <h3>📜 Trade History (REAL)</h3>
    <table id="history"></table>
</div>

<script>
const API = "/signal";
const HISTORY_API = "/history";

let chartWidgets = {};

function safe(n){ return n ?? 0; }

function getColor(s){
    return s==="BUY"?"buy":"sell";
}

// ================= LOAD SIGNALS =================
function loadData(){
    fetch(API)
    .then(r=>r.json())
    .then(data=>{

        let html = "";
        let totalPnL = 0;

        data.all_signals.forEach(s=>{

            let pnl = safe(s.pnl);
            totalPnL += pnl;

            html += `
            <div class="card">
                <b>${s.symbol}</b>
                <p class="${getColor(s.signal)}">${s.signal}</p>

                <p>Live: <span class="blink">${safe(s.live_price).toFixed(2)}</span></p>
                <p>PnL: ${pnl.toFixed(2)}</p>

                <div class="bar">
                    <div class="fill ${pnl>=0?'green':'red'}"
                         style="width:${Math.min(Math.abs(pnl),100)}%">
                    </div>
                </div>

                <div class="confidence-bar">
                    <div class="confidence-fill"
                         style="width:${safe(s.confidence)}%">
                    </div>
                </div>
                <small>Confidence: ${safe(s.confidence)}%</small>

            </div>`;
        });

        document.getElementById("signals").innerHTML = html;

        // BEST TRADE
        if(data.best_trade){
            let b = data.best_trade;

            document.getElementById("best").innerHTML = `
                <div class="card">
                    <h2>${b.symbol}</h2>
                    <p class="${getColor(b.signal)}">${b.signal}</p>
                    <p>Live: ${safe(b.live_price).toFixed(2)}</p>

                    <div class="confidence-bar">
                        <div class="confidence-fill"
                             style="width:${safe(b.confidence)}%">
                        </div>
                    </div>
                </div>`;
        }

        document.getElementById("totalPnL").innerText = totalPnL.toFixed(2);
        document.getElementById("trades").innerText = data.all_signals.length;

        loadCharts(document.getElementById("symbols").value.split(","));
    });
}

// ================= LOAD REAL HISTORY =================
function loadHistory(){
    fetch(HISTORY_API)
    .then(r=>r.json())
    .then(data=>{

        let html = "";

        data.slice().reverse().forEach(t=>{
            html += `
            <tr>
                <td>${t.symbol}</td>
                <td>${t.signal}</td>
                <td>${t.entry}</td>
                <td>${t.exit}</td>
                <td class="${t.pnl>=0?'buy':'sell'}">${t.pnl}</td>
                <td>${t.time}</td>
            </tr>`;
        });

        document.getElementById("history").innerHTML = html;
    });
}

// ================= CHARTS =================
function loadCharts(symbols){

    symbols.forEach(s=>{
        if(chartWidgets[s]) return;

        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<div id="tv_${s}" style="height:300px;"></div>`;
        document.getElementById("charts").appendChild(div);

        chartWidgets[s] = new TradingView.widget({
            container_id:`tv_${s}`,
            width:"100%",
            height:300,
            symbol:s.includes("USDT")?"BINANCE:"+s:"NASDAQ:"+s,
            theme:"dark"
        });
    });
}

// ================= CONFIG =================
function saveConfig(){
    fetch("/symbols",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            symbols: document.getElementById("symbols").value.split(","),
            risk_reward: document.getElementById("rr").value
        })
    });
}

// ================= LOOP =================
setInterval(()=>{
    loadData();
    loadHistory();
}, 5000);

loadData();
loadHistory();
</script>

</body>
</html>
